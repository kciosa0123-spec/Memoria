<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Memoria - AI Vocabulary Learning</title>
  <style>
    :root {
      --primary: #4F46E5;
      --primary-hover: #4338CA;
      --bg: #F9FAFB;
      --card-bg: #FFFFFF;
      --text-main: #111827;
      --text-muted: #6B7280;
      --border: #E5E7EB;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: var(--bg);
      color: var(--text-main);
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    nav {
      width: 100%;
      background-color: var(--primary);
      padding: 10px 0;
      display: flex;
      justify-content: center;
      gap: 15px;
    }
    nav button {
      background: none;
      border: none;
      color: white;
      font-size: 16px;
      cursor: pointer;
      padding: 5px 10px;
      border-radius: 5px;
    }
    nav button:hover {
      background-color: var(--primary-hover);
    }
    .container {
      width: 90%;
      max-width: 600px;
      margin-top: 20px;
      margin-bottom: 50px;
    }
    .tab-content {
      display: none;
    }
    .tab-content.active {
      display: block;
    }
    /* ボタン全般 */
    .btn {
      padding: 10px 15px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
      color: white;
    }
    .btn-primary { background-color: var(--primary); }
    .btn-secondary { background-color: #10B981; }
    .btn-warning { background-color: #F59E0B; }
    .btn-danger { background-color: #EF4444; }
    .btn-eval { flex: 1; padding: 15px 0; font-size: 16px; margin: 0 5px; }
    
    /* カードUI */
    .flashcard {
      background-color: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 30px;
      text-align: center;
      box-shadow: 0 4px 6px rgba(0,0,0,0.05);
      margin-bottom: 20px;
    }
    .word-title { font-size: 32px; font-weight: bold; margin-bottom: 10px; }
    .meaning-text { font-size: 20px; color: var(--primary); margin-bottom: 15px; }
    .example-text { font-size: 16px; color: var(--text-muted); font-style: italic; }
    
    /* リスト・テキストエリア */
    textarea { width: 100%; height: 150px; padding: 10px; box-sizing: border-box; margin-bottom: 10px; font-family: monospace; }
    ul { list-style: none; padding: 0; }
    li { background: var(--card-bg); margin-bottom: 8px; padding: 15px; border-radius: 5px; border: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center;}
    .list-info { font-size: 12px; color: var(--text-muted); display: block; margin-top: 5px;}
  </style>
</head>
<body>

  <nav>
    <button onclick="switchTab('tab-dashboard')">🏠 ホーム</button>
    <button onclick="switchTab('tab-list')">📋 単語管理</button>
    <button onclick="switchTab('tab-import')">➕ 追加</button>
  </nav>

  <div class="container">
    
    <div id="tab-dashboard" class="tab-content active">
      <h2 style="text-align: center;">学習を始める</h2>
      <div style="display: flex; flex-direction: column; gap: 15px;">
        <button onclick="startLearningMode('review')" class="btn btn-primary" style="padding: 20px; font-size: 18px;">
          📅 今日の復習を開始する
        </button>
        <button onclick="startLearningMode('new')" class="btn btn-secondary" style="padding: 15px;">
          ✨ 新しく覚える (最大10単語)
        </button>
        <button onclick="startLearningMode('weak')" class="btn btn-warning" style="padding: 15px;">
          💪 苦手な単語を特訓する
        </button>
      </div>
    </div>

    <div id="tab-learning" class="tab-content">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <div id="learning-progress" style="font-weight: bold; font-size: 16px;"></div>
        <button onclick="suspendLearning()" class="btn" style="background-color: #9CA3AF; padding: 5px 10px; font-size: 12px;">⏸️ 中断して戻る</button>
      </div>
      
      <div class="flashcard" id="flashcard-ui">
        <div class="word-title" id="card-word"></div>
        <div class="example-text" id="card-hint" style="margin-bottom: 20px;"></div>
        <button onclick="speakWord()" class="btn" style="background: #e5e7eb; color: #374151; margin-bottom: 20px;">🔊 発音</button>
        
        <div id="card-back" style="display: none;">
          <hr style="border-top: 1px solid var(--border); margin: 20px 0;">
          <div class="meaning-text" id="card-meaning"></div>
          <div class="example-text" id="card-example"></div>
        </div>
      </div>

      <div id="btn-show-answer" style="text-align: center;">
        <button onclick="showAnswer()" class="btn btn-primary" style="width: 100%; padding: 15px; font-size: 18px;">答えを見る</button>
      </div>

      <div id="eval-buttons" style="display: none; justify-content: space-between;">
        <button onclick="evaluateCard('forgot')" class="btn btn-danger btn-eval">忘れた<br><small>(あとでもう一度)</small></button>
        <button onclick="evaluateCard('hard')" class="btn btn-warning btn-eval">難しい<br><small>(1日後)</small></button>
        <button onclick="evaluateCard('good')" class="btn btn-secondary btn-eval">普通</button>
        <button onclick="evaluateCard('easy')" class="btn btn-primary btn-eval">簡単</button>
      </div>
    </div>

    <div id="tab-list" class="tab-content">
      <h2>単語リストとデータ管理</h2>
      
      <div style="background: #e0f2fe; padding: 15px; border-radius: 5px; margin-bottom: 20px;">
        <h3 style="margin-top: 0;">💾 バックアップと復元</h3>
        <p style="font-size: 14px;">PC移行やデータ消失に備えて定期的に保存してください。</p>
        <button onclick="exportData()" class="btn btn-primary" style="margin-bottom: 10px; width: 100%;">⬇️ 全データをエクスポート (JSON)</button>
        <input type="file" id="import-file" accept=".json" style="display: none;" onchange="importBackup(event)">
        <button onclick="document.getElementById('import-file').click()" class="btn btn-danger" style="width: 100%;">⬆️ バックアップから復元 (完全上書き)</button>
      </div>

      <h3>登録済み単語 (<span id="total-words">0</span>件)</h3>
      <ul id="vocab-list"></ul>
    </div>

    <div id="tab-import" class="tab-content">
      <h2>AIから単語をインポート</h2>
      <p style="font-size: 14px;">AIに出力させたJSON配列を貼り付けてください。重複・形式不備は自動でスキップされます。</p>
      
      <textarea id="import-textarea" placeholder='[
  {
    "word": "take off",
    "meaning": "（服などを）脱ぐ",
    "example": "He was taking his jacket off.",
    "example_masked": "He was ______ his jacket ______."
  }
]'></textarea>
      <button onclick="handleImport()" class="btn btn-secondary" style="width: 100%; padding: 15px;">インポートを実行</button>

      <div id="import-result" style="display: none; margin-top: 20px; padding: 15px; border-radius: 5px; background-color: #e0f2fe; border: 1px solid #bae6fd;">
        <h4 style="margin-top: 0; color: #0284c7; margin-bottom: 10px;">インポート結果</h4>
        <p id="import-summary" style="font-weight: bold; margin-bottom: 10px; color: #0f172a;"></p>
        <div id="import-details" style="font-size: 14px; color: #334155;"></div>
      </div>
    </div>

  </div>

  <script>
    // ==========================================
    // 状態管理・初期化・正規化処理
    // ==========================================
    let learningQueue = [];
    let currentIndex = 0;
    let currentCard = null;

    /** 単語カードのデータを最新の仕様に合わせて正規化 */
    function normalizeCard(card) {
      const repetition = Number(card.repetition || 0);
      return {
        id: card.id || Date.now().toString() + Math.random().toString(36).substring(2, 7),
        word: String(card.word || "").trim(),
        meaning: String(card.meaning || "").trim(),
        example: String(card.example || ""),
        example_masked: String(card.example_masked || ""),
        status: card.status || (repetition === 0 ? "new" : "review"),
        repetition: repetition,
        interval: Number(card.interval || 0),
        efactor: Number(card.efactor || 2.5),
        lapses: Number(card.lapses || 0),
        nextReviewDate: normalizeDate(card.nextReviewDate)
      };
    }

    /** 日付データを安全にタイムスタンプに変換 */
    function normalizeDate(value) {
      if (!value) return new Date().getTime();
      if (typeof value === "number") return value;
      const parsed = new Date(value).getTime();
      return Number.isNaN(parsed) ? new Date().getTime() : parsed;
    }

    // アプリ起動時の処理（マイグレーション）
    window.onload = () => {
      let existingCards = JSON.parse(localStorage.getItem('my_vocab_cards')) || [];
      if (existingCards.length > 0) {
        // 既存データを最新仕様に一括変換して保存
        const migratedCards = existingCards.map(normalizeCard);
        localStorage.setItem('my_vocab_cards', JSON.stringify(migratedCards));
      }
      renderVocabList();
    };

    function switchTab(tabId) {
      document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
      document.getElementById(tabId).classList.add('active');
      
      if(tabId === 'tab-list') renderVocabList();
      // インポートタブを開くたびに前回の結果を隠す
      if(tabId === 'tab-import') document.getElementById('import-result').style.display = 'none';
    }

    // ==========================================
    // 学習モードと抽出ロジック
    // ==========================================
    /** 旧形式データにも対応する次回復習時間の取得 */
    function getReviewTime(card) {
      if (!card.nextReviewDate) return 0;
      if (typeof card.nextReviewDate === "number") return card.nextReviewDate;
      const time = new Date(card.nextReviewDate).getTime();
      return Number.isNaN(time) ? 0 : time;
    }

    function startLearningMode(mode) {
      const allCards = JSON.parse(localStorage.getItem('my_vocab_cards')) || [];
      const now = new Date().getTime();

      switch (mode) {
        case 'review':
          learningQueue = allCards.filter(card => card.status !== 'new' && getReviewTime(card) <= now);
          break;
        case 'new':
          learningQueue = allCards.filter(card => card.status === 'new' || (!card.status && (!card.repetition || card.repetition === 0))).slice(0, 10);
          break;
        case 'weak':
          learningQueue = allCards.filter(card => card.status === 'learning' || (card.lapses || 0) >= 2 || (card.efactor !== undefined && card.efactor < 2.0));
          break;
      }

      if (learningQueue.length === 0) {
        const msgs = {
          'review': "今日の復習タスクはすべて完了しています！",
          'new': "未学習の単語はありません。新しく追加しましょう！",
          'weak': "現在「苦手」と判定されている単語はありません！"
        };
        alert(msgs[mode]);
        return;
      }

      currentIndex = 0;
      switchTab('tab-learning');
      showNextCard();
    }

    /** 学習の一時中断 */
    function suspendLearning() {
      if (confirm("学習を一時中断してホームに戻りますか？\n（※これまでに評価した単語の進捗は保存されています！）")) {
        learningQueue = [];
        currentIndex = 0;
        currentCard = null;
        speechSynthesis.cancel();
        switchTab('tab-dashboard');
      }
    }

    function escapeRegExp(string) {
      return string.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); 
    }

    // カード表示処理
    function showNextCard() {
      if (currentIndex >= learningQueue.length) {
        alert("このセッションの学習が完了しました！お疲れ様でした。");
        switchTab('tab-dashboard');
        return;
      }

      currentCard = learningQueue[currentIndex];
      document.getElementById('learning-progress').textContent = `${currentIndex + 1} / ${learningQueue.length}`;
      
      // 表面のセット
      document.getElementById('card-word').textContent = currentCard.word;
      document.getElementById('card-meaning').textContent = currentCard.meaning;
      
      // 例文のヒント（穴埋め処理）
      if (currentCard.example) {
        if (currentCard.example_masked) {
          // ① 新仕様：AIが作ってくれた高精度のマスク例文を使用
          document.getElementById('card-hint').textContent = currentCard.example_masked;
        } else {
          // ② 旧仕様：正規表現のフォールバック
          const safeWord = escapeRegExp(currentCard.word);
          const regex = new RegExp(`(${safeWord})`, 'gi');
          document.getElementById('card-hint').textContent = currentCard.example.replace(regex, '______');
        }
        document.getElementById('card-example').textContent = ""; // 答えを見るまでは空
      } else {
        document.getElementById('card-hint').textContent = "";
        document.getElementById('card-example').textContent = "";
      }

      // UIリセット
      document.getElementById('card-back').style.display = 'none';
      document.getElementById('eval-buttons').style.display = 'none';
      document.getElementById('btn-show-answer').style.display = 'block';
    }

    function showAnswer() {
      document.getElementById('card-back').style.display = 'block';
      document.getElementById('btn-show-answer').style.display = 'none';
      document.getElementById('eval-buttons').style.display = 'flex';
      
      // 答えの完全な例文を表示
      if (currentCard.example) {
        document.getElementById('card-example').textContent = currentCard.example;
      }
    }

    // 音声読み上げ
    function speakWord() {
      if (!currentCard) return;
      speechSynthesis.cancel(); // 重なり防止
      const utterance = new SpeechSynthesisUtterance(currentCard.word);
      utterance.lang = 'en-US';
      speechSynthesis.speak(utterance);
    }

    // ==========================================
    // 復習アルゴリズム
    // ==========================================
    function evaluateCard(evaluation) {
      const now = new Date().getTime();

      switch (evaluation) {
        case 'forgot':
          currentCard.status = 'learning';
          currentCard.repetition = 0;
          currentCard.lapses = (currentCard.lapses || 0) + 1;
          currentCard.efactor = Math.max(1.3, currentCard.efactor - 0.2);
          currentCard.nextReviewDate = now + (10 * 60 * 1000); // 10分後
          currentCard.interval = 0;
          break;
        case 'hard':
          currentCard.status = 'learning';
          currentCard.efactor = Math.max(1.3, currentCard.efactor - 0.15);
          currentCard.interval = 1; 
          currentCard.nextReviewDate = now + (currentCard.interval * 24 * 60 * 60 * 1000);
          break;
        case 'good':
          currentCard.status = 'review';
          currentCard.lapses = Math.max(0, (currentCard.lapses || 0) - 1); // 苦手克服
          currentCard.repetition += 1;
          if (currentCard.repetition === 1) currentCard.interval = 1;
          else if (currentCard.repetition === 2) currentCard.interval = 6;
          else currentCard.interval = Math.round(currentCard.interval * currentCard.efactor);
          currentCard.nextReviewDate = now + (currentCard.interval * 24 * 60 * 60 * 1000);
          break;
        case 'easy':
          currentCard.status = 'review';
          currentCard.lapses = Math.max(0, (currentCard.lapses || 0) - 2); // 苦手克服
          currentCard.repetition += 1;
          currentCard.efactor += 0.15;
          if (currentCard.repetition === 1) currentCard.interval = 2;
          else if (currentCard.repetition === 2) currentCard.interval = 8;
          else currentCard.interval = Math.round(currentCard.interval * currentCard.efactor * 1.3);
          currentCard.nextReviewDate = now + (currentCard.interval * 24 * 60 * 60 * 1000);
          break;
      }

      let allCards = JSON.parse(localStorage.getItem('my_vocab_cards')) || [];
      const cardIndex = allCards.findIndex(c => c.id === currentCard.id);
      if (cardIndex !== -1) {
        allCards[cardIndex] = currentCard;
        localStorage.setItem('my_vocab_cards', JSON.stringify(allCards));
      }

      if (evaluation === 'forgot') {
         learningQueue.push({...currentCard}); 
      }

      currentIndex++;
      showNextCard();
    }

    // ==========================================
    // データ管理
    // ==========================================
    function handleImport() {
      const jsonString = document.getElementById('import-textarea').value;
      try {
        const newCards = JSON.parse(jsonString);
        if (!Array.isArray(newCards)) throw new Error("JSON配列を入力してください。");

        let existingCards = JSON.parse(localStorage.getItem('my_vocab_cards')) || [];
        let addedCount = 0;
        let skippedWords = [];
        let invalidItems = [];
        const existingWords = existingCards.map(card => card.word.toLowerCase());

        newCards.forEach((newCard, index) => {
          // 厳格なバリデーション
          if (
            !newCard.word ||
            !newCard.meaning ||
            typeof newCard.word !== 'string' ||
            typeof newCard.meaning !== 'string' ||
            newCard.word.trim() === '' ||
            newCard.meaning.trim() === ''
          ) {
            // エラー表示用のラベル作成
            const errorLabel = (newCard.word && typeof newCard.word === 'string') 
                                ? newCard.word.trim() 
                                : `(データ ${index + 1}番目)`;
            invalidItems.push(errorLabel);
            return;
          } 

          const normalizedWord = newCard.word.trim();
          const normalizedMeaning = newCard.meaning.trim();
          const wordLower = normalizedWord.toLowerCase();

          if (existingWords.includes(wordLower)) {
            skippedWords.push(normalizedWord);
          } else {
            existingCards.push({
              id: Date.now().toString() + Math.random().toString(36).substring(2, 7),
              word: normalizedWord,
              meaning: normalizedMeaning,
              example: newCard.example ? String(newCard.example).trim() : "",
              example_masked: newCard.example_masked ? String(newCard.example_masked).trim() : "",
              status: 'new', 
              repetition: 0,
              interval: 0,
              efactor: 2.5,
              lapses: 0,
              nextReviewDate: new Date().getTime()
            });
            existingWords.push(wordLower);
            addedCount++;
          }
        });

        localStorage.setItem('my_vocab_cards', JSON.stringify(existingCards));
        
        // --- 結果のUI表示構築 ---
        const resultArea = document.getElementById('import-result');
        const summaryElem = document.getElementById('import-summary');
        const detailsElem = document.getElementById('import-details');
        
        resultArea.style.display = 'block';
        
        let summaryText = `✅ ${addedCount}件を追加しました。`;
        if (skippedWords.length > 0) summaryText += ` 🔄 ${skippedWords.length}件の重複をスキップ。`;
        if (invalidItems.length > 0) summaryText += ` ⚠️ ${invalidItems.length}件の形式不備をスキップ。`;
        summaryElem.textContent = summaryText;
        
        detailsElem.innerHTML = ''; // 初期化
        
        if (skippedWords.length > 0) {
          const pSkip = document.createElement('p');
          pSkip.style.margin = "5px 0";
          const strongSkip = document.createElement('strong');
          strongSkip.textContent = '重複スキップ: ';
          pSkip.appendChild(strongSkip);
          pSkip.appendChild(document.createTextNode(skippedWords.join(', ')));
          detailsElem.appendChild(pSkip);
        }
        
        if (invalidItems.length > 0) {
          const pInv = document.createElement('p');
          pInv.style.margin = "5px 0";
          const strongInv = document.createElement('strong');
          strongInv.textContent = '形式不備スキップ: ';
          pInv.appendChild(strongInv);
          pInv.appendChild(document.createTextNode(invalidItems.join(', ')));
          detailsElem.appendChild(pInv);
        }

        alert(`インポート処理が完了しました！\n詳細は画面の結果エリアをご確認ください。`);
        document.getElementById('import-textarea').value = '';
        renderVocabList();
      } catch (error) {
        alert("エラー: JSONの読み込みに失敗しました。フォーマットを確認してください。");
      }
    }

    function renderVocabList() {
      const cards = JSON.parse(localStorage.getItem('my_vocab_cards')) || [];
      document.getElementById('total-words').textContent = cards.length;
      const listElement = document.getElementById('vocab-list');
      listElement.innerHTML = ''; 

      cards.forEach((card, index) => {
        const li = document.createElement('li');
        const textContainer = document.createElement('div');
        
        const strongWord = document.createElement('strong');
        strongWord.textContent = card.word; 
        const textMeaning = document.createTextNode(` : ${card.meaning}`);
        
        const infoSpan = document.createElement('span');
        infoSpan.className = 'list-info';
        const nextDate = card.nextReviewDate ? new Date(card.nextReviewDate).toLocaleDateString() : '未学習';
        const statusText = card.status ? card.status : '不明';
        infoSpan.textContent = `状態: ${statusText} | 連続正解: ${card.repetition || 0}回 | 次回: ${nextDate}`;

        textContainer.appendChild(strongWord);
        textContainer.appendChild(textMeaning);
        textContainer.appendChild(infoSpan);

        const delBtn = document.createElement('button');
        delBtn.textContent = '削除';
        delBtn.className = 'btn btn-danger';
        delBtn.style.padding = '5px 10px';
        delBtn.onclick = () => {
          if(confirm('本当に削除しますか？')) {
            cards.splice(index, 1);
            localStorage.setItem('my_vocab_cards', JSON.stringify(cards));
            renderVocabList();
          }
        };

        li.appendChild(textContainer);
        li.appendChild(delBtn);
        listElement.appendChild(li);
      });
    }

    function exportData() {
      const data = localStorage.getItem('my_vocab_cards') || '[]';
      const blob = new Blob([data], { type: 'application/json' });
      const url = URL.createObjectURL(blob);
      
      const today = new Date();
      const dateStr = today.getFullYear() + String(today.getMonth() + 1).padStart(2, '0') + String(today.getDate()).padStart(2, '0');
      const fileName = `memoria_backup_${dateStr}.json`;

      const a = document.createElement('a');
      a.href = url;
      a.download = fileName;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
    }

    function importBackup(event) {
      const file = event.target.files[0];
      if (!file) return;

      if (!confirm("⚠️ 現在の学習データはすべて消去され、選択したバックアップデータで【完全に上書き】されます。本当によろしいですか？")) {
        event.target.value = '';
        return;
      }

      const reader = new FileReader();
      reader.onload = function(e) {
        try {
          const importedData = JSON.parse(e.target.result);
          
          if (!Array.isArray(importedData)) {
            throw new Error("無効なデータ形式（配列ではありません）。");
          }
          
          const isValidFormat = importedData.every(card => 
            card !== null && 
            typeof card === 'object' &&
            'id' in card && 
            'word' in card && 
            'meaning' in card
          );

          if (!isValidFormat) {
             throw new Error("データが破損しているか、形式が異なります。（必須項目が欠落しています）");
          }
          
          // バックアップの復元時にも、すべてのデータを最新仕様に正規化して保存
          const normalizedData = importedData.map(normalizeCard);
          localStorage.setItem('my_vocab_cards', JSON.stringify(normalizedData));
          
          alert("データの復元が完了しました！");
          renderVocabList();
        } catch (error) {
          alert(`エラー: ${error.message}\n正しいバックアップJSONファイルを選択してください。`);
        }
      };
      reader.readAsText(file);
      event.target.value = ''; 
    }
  </script>
</body>
</html>
